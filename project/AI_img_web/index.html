<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> AI Image Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo-wrapper">
                <div class="logo">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                </div>
                <h1> AI Image Generator</h1>
            </div>
            
            <button class="theme-toggle">
                <i class="fa-solid fa-moon"></i>
            </button>
        </header>

        <div class="main-content">
            <form action="#" class="prompt-form">
                <div class="prompt-container">
                    <textarea class="prompt_input" placeholder="Describe your imagination in detail....." required autofocus></textarea>
                    <button type="button" class="prompt-btn">
                      <i class="fa-solid fa-moon"></i>
                    </button>
                </div>

                <div class="prompt-action">
                    <div class="select-wrapper">
                        <select name="custom-select" id="model-select" required>
                            <option value="">Select disabled</option>
                            <option value="black-forest-labs/FLUX.1-dev">FLUX.1-dev</option>
                            <option value="stabilityai/stable-diffusion-xl-base-1.0">Stable Diffusion XL</option>
                            <option value="runwayml/stable-diffusion-v1-5">Stable Diffusion v1.5</option>
                            <option value="prompthero/openjourney">Open journey</option>
                        </select>
                    </div>

                    <div class="select-wrapper">
                        <select class="custom-select" id="count-select" required>
                            <option value=""select disabled>Image Count</option>
                            <option value="1">1 Image</option>
                            <option value="2">2 Image</option>
                            <option value="3">3 Image</option>
                            <option value="4">4 Image</option>
                        </select>
                    </div>

                    <div class="select-wrapper">
                        <select class="custom-select" id="ratio-select" required>
                            <option value=""select disabled>Image Count</option>
                            <option value="1/1">(1:1) Image</option>
                            <option value="16/9">(16:9) Image</option>
                            <option value="9/16">(9:16) Image</option>
                        </select>
                    </div>

                    <button type="submit" class="generate-btn">
                        <i class="fa-solid fa-wand-sparkles"></i>
                        Generate
                    </button>
                </div>

                <!--Prompt Action.Button-->
                <div class="prompt-action">

                </div>

                <!--Result Gallery Grid-->
                <div class="gallery-grid">
                    <div class="img-card loading">
                        <div class="status-container">
                            <div class="spinner"></div>
                            <i class="fa-solid fa-triangle-exclamation"></i>
                            <p class="status-text">Generating...</p>
                        </div>
                        <img src="test.png" class="result-img"/>
                        <div class="img-overload">
                            <button class="img-download-btn">
                                <i class="fa-solid fa-download"></i>
                            </button>
                        </div>               
                    </div>

                    <div class="img-card">
                        <img src="test.png" class="result-img"/>
                        <div class="img-overload">
                            <button class="img-download-btn">
                                <i class="fa-solid fa-download"></i>
                            </button>
                        </div>
                        
                    </div>

                    <div class="img-card">
                        <img src="test.png" class="result-img"/>
                        <div class="img-overload">
                            <button class="img-download-btn">
                                <i class="fa-solid fa-download"></i>
                            </button>
                        </div>
                        
                    </div>

                    <div class="img-card">
                        <img src="test.png" class="result-img"/>
                        <div class="img-overload">
                            <button class="img-download-btn">
                                <i class="fa-solid fa-download"></i>
                            </button>
                        </div>
                        
                    </div>

                </div>

            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
